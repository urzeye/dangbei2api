name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # 从 CHANGELOG.md 提取当前版本的变更日志
          awk '/^## \['${VERSION#v}'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > release_notes.md

          # 如果提取失败，使用默认内容
          if [ ! -s release_notes.md ]; then
            echo "## 发布说明" > release_notes.md
            echo "" >> release_notes.md
            echo "详细变更请查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)" >> release_notes.md
          fi

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on related issues
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "✅ Version ${VERSION} has been released!"
          echo "🐳 Docker image: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/dangbei2api:${VERSION#v}"
